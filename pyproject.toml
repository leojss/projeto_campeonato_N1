[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"

[tool.coverage.run]
source = ["services", "agents", "utils", "repositories", "models"]
omit = ["tests/*", "backend/*", "*/migrations/*"]

[tool.coverage.report]
show_missing = true
skip_covered = false
